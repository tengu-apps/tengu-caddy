name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CADDY_PLUGINS: "github.com/caddy-dns/cloudflare@v0.2.4"

jobs:
  build-deb:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build .deb package
        run: make deb ARCH=${{ matrix.arch }}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tengu-caddy-deb-${{ matrix.arch }}
          path: build/*.deb

  build-binaries:
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            asset: tengu-caddy-macos-arm64
          - os: linux
            arch: amd64
            asset: tengu-caddy-linux-amd64
          - os: linux
            arch: arm64
            asset: tengu-caddy-linux-arm64

    runs-on: ubuntu-latest

    steps:
      - name: Download Caddy with Cloudflare DNS plugin
        run: |
          curl -fsSL "https://caddyserver.com/api/download?os=${{ matrix.os }}&arch=${{ matrix.arch }}&p=${CADDY_PLUGINS}" \
            -o ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}
          file ${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: [build-deb, build-binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    name: update-homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        id: checksums
        run: |
          for asset in tengu-caddy-macos-arm64 tengu-caddy-linux-amd64 tengu-caddy-linux-arm64; do
            curl -fsSL "https://github.com/tengu-apps/tengu-caddy/releases/download/${GITHUB_REF_NAME}/${asset}" -o "${asset}"
            sha=$(sha256sum "${asset}" | cut -d' ' -f1)
            key=$(echo "${asset}" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_MACOS="${{ steps.checksums.outputs.tengu_caddy_macos_arm64 }}"
          SHA_LINUX_AMD="${{ steps.checksums.outputs.tengu_caddy_linux_amd64 }}"
          SHA_LINUX_ARM="${{ steps.checksums.outputs.tengu_caddy_linux_arm64 }}"

          cat > /tmp/tengu-caddy.rb <<EOF
          class TenguCaddy < Formula
            desc "Caddy web server with Cloudflare DNS plugin"
            homepage "https://github.com/tengu-apps/tengu-caddy"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/tengu-apps/tengu-caddy/releases/download/v#{version}/tengu-caddy-macos-arm64"
                sha256 "${SHA_MACOS}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/tengu-apps/tengu-caddy/releases/download/v#{version}/tengu-caddy-linux-arm64"
                sha256 "${SHA_LINUX_ARM}"
              end

              on_intel do
                url "https://github.com/tengu-apps/tengu-caddy/releases/download/v#{version}/tengu-caddy-linux-amd64"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            conflicts_with "caddy", because: "both install a caddy binary"

            def install
              binary = Dir["tengu-caddy-*"].first || "tengu-caddy"
              bin.install binary => "caddy"
            end

            test do
              assert_match "cloudflare", shell_output("#{bin}/caddy list-modules 2>&1")
            end
          end
          EOF

          sed -i 's/^          //' /tmp/tengu-caddy.rb

          CONTENT=$(base64 -w0 /tmp/tengu-caddy.rb)

          # Try update, fall back to create
          SHA=$(gh api repos/tengu-apps/homebrew-tap/contents/Formula/tengu-caddy.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$SHA" ]; then
            gh api repos/tengu-apps/homebrew-tap/contents/Formula/tengu-caddy.rb \
              -X PUT \
              -f message="Update tengu-caddy to ${VERSION}" \
              -f content="${CONTENT}" \
              -f sha="${SHA}"
          else
            gh api repos/tengu-apps/homebrew-tap/contents/Formula/tengu-caddy.rb \
              -X PUT \
              -f message="Add tengu-caddy ${VERSION}" \
              -f content="${CONTENT}"
          fi
